services:
  - type: web
    name: medbridge-backend
    env: python
    buildCommand: pip install -r backend-requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        sync: false # Set securely in Render dashboard
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URLS
        sync: false # e.g. https://medbridge-patient.streamlit.app,https://medbridge-doctor.streamlit.app
      - key: SECRET_KEY
        sync: false
      - key: ENV
        value: production
